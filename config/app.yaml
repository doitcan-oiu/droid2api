# ============================================================
# droid2api 应用配置文件
# 支持热加载 - 修改后自动生效，无需重启服务
# ============================================================

# 服务端口
port: 3000

# 开发模式（开启后输出详细调试日志）
dev_mode: false

# 系统提示词（注入到所有请求中）
system_prompt: "You are Droid, an AI software engineering agent built by Factory.\n\n"

# User-Agent 默认版本号
user_agent: "factory-cli/0.84.0"

# ============================================================
# 认证配置
# 优先级：factory_api_keys > data/auth.json 账户 > 客户端 Authorization
#
# 刷新令牌通过 API 接口管理，不再在此处配置：
#   POST   /api/auth/keys      添加刷新令牌（提交后立即验证）
#   GET    /api/auth/status     查看认证状态
#   DELETE /api/auth/keys/:id   删除账户
#
# 首次部署可通过环境变量 DROID_REFRESH_KEY 传入初始令牌（逗号分隔多个）
# 也可通过环境变量 FACTORY_API_KEY 传入固定密钥（逗号分隔多个）
# ============================================================
auth:
  # 固定 API 密钥（跳过自动刷新，多个时轮询）
  factory_api_keys: []
    # - "your_factory_api_key_1"
    # - "your_factory_api_key_2"

# ============================================================
# 模型重定向映射
# 将旧模型ID自动映射到新模型ID
# ============================================================
model_redirects:
  claude-3-5-haiku-20241022: "claude-haiku-4-5-20251001"
  claude-sonnet-4-5: "claude-sonnet-4-5-20250929"

# ============================================================
# API 端点配置
# ============================================================
endpoints:
  - name: openai
    base_url: "https://api.factory.ai/api/llm/o/v1/responses"

  - name: anthropic
    base_url: "https://api.factory.ai/api/llm/a/v1/messages"

  - name: common
    base_url: "https://api.factory.ai/api/llm/o/v1/chat/completions"

# ============================================================
# 代理配置（可选）
# 为所有下游请求配置HTTP代理，多个代理时轮询使用
# 数组为空表示直连
# ============================================================
proxies: []
  # - name: "default-proxy"
  #   url: "http://127.0.0.1:3128"
  # - name: "auth-proxy"
  #   url: "http://username:password@123.123.123.123:12345"

# ============================================================
# 模型配置
# 推理级别(reasoning)可选值：auto / off / low / medium / high / xhigh
#   auto   - 遵循客户端原始请求，不做修改
#   off    - 强制关闭推理
#   low    - 轻度推理 (Anthropic: 4096 tokens)
#   medium - 中度推理 (Anthropic: 12288 tokens)
#   high   - 深度推理 (Anthropic: 24576 tokens)
#   xhigh  - 超深度推理 (Anthropic: 40960 tokens)
# fast 字段: true 时启用快速模式
#   Anthropic 模型 → 自动添加 anthropic-beta: fast-mode-2026-02-01
#   OpenAI 模型   → 自动设置 service_tier: priority
# ============================================================
models:
  - name: "Opus 4.5"
    id: "claude-opus-4-5-20251101"
    type: anthropic
    reasoning: auto
    provider: anthropic

  - name: "Opus 4.6"
    id: "claude-opus-4-6"
    type: anthropic
    reasoning: auto
    provider: anthropic

  - name: "Opus 4.6 Fast"
    id: "claude-opus-4-6-fast"
    type: anthropic
    reasoning: auto
    fast: true
    provider: anthropic

  - name: "Haiku 4.5"
    id: "claude-haiku-4-5-20251001"
    type: anthropic
    reasoning: auto
    provider: anthropic

  - name: "Sonnet 4.5"
    id: "claude-sonnet-4-5-20250929"
    type: anthropic
    reasoning: auto
    provider: anthropic

  - name: "Sonnet 4.6"
    id: "claude-sonnet-4-6"
    type: anthropic
    reasoning: auto
    provider: anthropic

  - name: "GPT-5.4"
    id: "gpt-5.4"
    type: openai
    reasoning: auto
    provider: openai

  - name: "GPT-5.4 Fast"
    id: "gpt-5.4-fast"
    type: openai
    reasoning: auto
    fast: true
    provider: openai

  - name: "GPT-5.4 mini"
    id: "gpt-5.4-mini"
