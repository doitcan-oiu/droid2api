<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>droid2api 令牌管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
  <div class="max-w-2xl mx-auto px-4 py-8">

    <h1 class="text-2xl font-bold mb-1">droid2api 令牌管理</h1>
    <p class="text-gray-400 text-sm mb-6">认证模式: <span id="mode" class="text-blue-400 font-mono">-</span></p>

    <!-- 添加令牌 -->
    <div class="bg-gray-800 rounded-lg p-4 mb-6">
      <h2 class="text-lg font-semibold mb-3">添加刷新令牌</h2>
      <div class="flex gap-2">
        <input id="keyInput" type="text" placeholder="输入 refresh token"
          class="flex-1 bg-gray-700 border border-gray-600 rounded px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
        <button onclick="addKey()" id="addBtn"
          class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-sm font-medium whitespace-nowrap">
          添加
        </button>
      </div>
      <p id="addMsg" class="text-sm mt-2 hidden"></p>
    </div>

    <!-- 账户列表 -->
    <div class="bg-gray-800 rounded-lg p-4">
      <div class="flex justify-between items-center mb-3">
        <h2 class="text-lg font-semibold">账户列表</h2>
        <button onclick="loadStatus()" class="text-gray-400 hover:text-white text-sm">刷新</button>
      </div>
      <div id="accountList"></div>
      <p id="emptyTip" class="text-gray-500 text-sm text-center py-6 hidden">暂无账户</p>
    </div>

  </div>

<script>
const API = window.location.origin;

async function loadStatus() {
  try {
    const res = await fetch(`${API}/api/auth/status`);
    const data = await res.json();

    document.getElementById('mode').textContent = {
      factory_key: '固定密钥',
      refresh: '刷新令牌',
      client: '客户端授权'
    }[data.mode] || data.mode;

    const list = document.getElementById('accountList');
    const empty = document.getElementById('emptyTip');

    if (data.accounts.length === 0) {
      list.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }

    empty.classList.add('hidden');
    list.innerHTML = data.accounts.map(a => `
      <div class="flex items-center justify-between py-3 border-b border-gray-700 last:border-0">
        <div class="min-w-0 flex-1">
          <div class="font-medium text-sm truncate">${esc(a.label)}</div>
          <div class="text-xs text-gray-400 mt-0.5">
            <span class="inline-block w-2 h-2 rounded-full mr-1 ${a.has_access_token ? 'bg-green-500' : 'bg-red-500'}"></span>
            ${a.has_access_token ? '可用' : '不可用'}
            ${a.last_refresh ? ' · 刷新于 ' + formatTime(a.last_refresh) : ''}
            ${a.needs_refresh ? ' · <span class="text-yellow-400">待刷新</span>' : ''}
          </div>
        </div>
        <button onclick="removeKey(${a.index})"
          class="ml-3 text-red-400 hover:text-red-300 text-sm shrink-0">删除</button>
      </div>
    `).join('');
  } catch (e) {
    console.error(e);
  }
}

async function addKey() {
  const input = document.getElementById('keyInput');
  const btn = document.getElementById('addBtn');
  const msg = document.getElementById('addMsg');
  const key = input.value.trim();
  if (!key) return;

  btn.disabled = true;
  btn.textContent = '验证中...';
  msg.classList.add('hidden');

  try {
    const res = await fetch(`${API}/api/auth/keys`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ key })
    });
    const data = await res.json();

    msg.classList.remove('hidden');
    if (res.ok) {
      msg.className = 'text-sm mt-2 text-green-400';
      msg.textContent = data.message || '添加成功';
      input.value = '';
      loadStatus();
    } else {
      msg.className = 'text-sm mt-2 text-red-400';
      msg.textContent = data.message || data.error || '添加失败';
    }
  } catch (e) {
    msg.classList.remove('hidden');
    msg.className = 'text-sm mt-2 text-red-400';
    msg.textContent = '网络错误';
  } finally {
    btn.disabled = false;
    btn.textContent = '添加';
  }
}

async function removeKey(index) {
  if (!confirm('确定删除该账户？')) return;
  try {
    await fetch(`${API}/api/auth/keys/${index}`, { method: 'DELETE' });
    loadStatus();
  } catch (e) {
    console.error(e);
  }
}

function formatTime(iso) {
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  return `${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

loadStatus();
setInterval(loadStatus, 30000);
</script>
</body>
</html>
